name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  integrity:
    name: Repo Integrity
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Check .mjs scripts parse
        run: |
          for f in scripts/*.mjs; do
            node --check "$f" && echo "✅ $f" || (echo "❌ $f" && exit 1)
          done

      - name: Check .js scripts parse
        run: |
          shopt -s nullglob
          for f in scripts/*.js; do
            node --check "$f" && echo "✅ $f" || (echo "❌ $f" && exit 1)
          done

      - name: Check .sh scripts
        run: |
          shopt -s nullglob
          for f in scripts/*.sh; do
            bash -n "$f" && echo "✅ $f" || (echo "❌ $f" && exit 1)
          done

      - name: Check .py scripts
        run: |
          shopt -s nullglob
          for f in scripts/*.py; do
            python3 -m py_compile "$f" && echo "✅ $f" || (echo "❌ $f" && exit 1)
          done

      - name: Check internal links
        run: node scripts/check-links.mjs

      - name: Required files exist
        run: |
          for f in SOUL.md AGENTS.md USER.md MEMORY.md HEARTBEAT.md TOOLS.md AI_STACK.md CHANGELOG.md; do
            test -f "$f" && echo "✅ $f" || (echo "❌ $f missing" && exit 1)
          done

      - name: Run health check
        run: node scripts/health-check.mjs

      - name: Smoke-test stats.mjs
        run: |
          output=$(node scripts/stats.mjs)
          echo "$output"
          # Validate required fields exist and are sane
          node -e "
            const d = JSON.parse(process.argv[1]);
            const required = ['days_alive', 'contemplations', 'dreams', 'generated_at'];
            const missing = required.filter(k => !(k in d));
            if (missing.length > 0) {
              console.error('❌ stats.mjs output missing keys:', missing.join(', '));
              process.exit(1);
            }
            if (typeof d.days_alive !== 'number' || d.days_alive <= 0) {
              console.error('❌ days_alive must be a positive number, got:', d.days_alive);
              process.exit(1);
            }
            if (typeof d.contemplations !== 'number' || d.contemplations < 0) {
              console.error('❌ contemplations must be a non-negative number, got:', d.contemplations);
              process.exit(1);
            }
            if (typeof d.dreams !== 'number' || d.dreams < 0) {
              console.error('❌ dreams must be a non-negative number, got:', d.dreams);
              process.exit(1);
            }
            console.log('✅ stats.mjs output valid — days_alive:', d.days_alive, 'contemplations:', d.contemplations, 'dreams:', d.dreams);
          " "$output"
